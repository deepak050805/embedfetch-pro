<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - EmbedFetch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { dark: { 800: '#1e1e2d', 900: '#151521' } } } } }
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-dark-900 text-white min-h-screen relative font-sans">
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-dark-900 via-dark-800 to-indigo-900/20 opacity-80"></div>
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto border-b border-white/10">
        <a href="/" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">EmbedFetch Pro</a>
        <div class="space-x-4"><a href="/single" class="text-gray-400 hover:text-white transition-colors">Switch to Single Video</a></div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="glass-card p-8 rounded-2xl border border-white/10">
            <h2 class="text-3xl font-bold mb-6">Playlist Downloader</h2>
            <form id="playlistForm" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Playlist URL</label>
                    <input type="url" id="playlistUrl" required placeholder="https://example.com/playlist/..." class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 transition-colors">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 py-3 rounded-xl font-semibold text-white transition-all shadow-lg shadow-pink-500/25 mt-2 flex justify-center items-center">
                    <span id="pBtnText">Fetch & Download All</span>
                    <svg id="pLoadingSpinner" class="animate-spin ml-2 h-5 w-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>
            
            <div id="pProgressContainer" class="mt-8 hidden">
                <div class="mb-2 flex justify-between text-sm">
                    <span class="text-gray-300">Status: <span id="pStatus" class="font-semibold text-pink-400">Processing...</span></span>
                    <span id="pStats" class="text-gray-400">0%</span>
                </div>
                <div class="w-full bg-dark-800 rounded-full h-3 mb-4 overflow-hidden border border-white/5">
                    <div id="pProgressBar" class="bg-gradient-to-r from-pink-500 to-purple-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <div id="playlistItems" class="mt-8 hidden border border-white/5 bg-dark-800/50 p-4 rounded-xl">
                <h3 class="text-lg font-semibold mb-4 text-gray-300 border-b border-white/10 pb-2">Videos Found in Playlist</h3>
                <ul id="videosList" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
